<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f8fafc"/>
  <rect x="40" y="30" width="520" height="340" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>

  <text x="60" y="68" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Global Oil Production</text>
  <text x="60" y="92" font-family="sans-serif" font-size="13" fill="#64748b">Who Still Moves the Map</text>

  <!-- Stylized area chart background (Non-OPEC) -->
  <polygon points="60,310 120,295 180,280 240,270 300,255 360,240 420,210 480,180 520,165 520,310" fill="rgba(59,130,246,0.12)" stroke="none"/>

  <!-- OPEC area -->
  <polygon points="60,310 120,300 180,290 240,285 300,275 360,270 420,265 480,260 520,255 520,310" fill="rgba(230,57,70,0.18)" stroke="none"/>

  <!-- US line (red accent, rising steeply) -->
  <polyline points="60,290 120,285 180,280 240,275 300,270 360,255 420,210 480,175 520,155"
    fill="none" stroke="#e63946" stroke-width="3" stroke-linecap="round"/>

  <!-- Saudi Arabia line (grey, flat) -->
  <polyline points="60,265 120,250 180,270 240,260 300,255 360,258 420,252 480,250 520,248"
    fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Russia line (grey, dip and recover) -->
  <polyline points="60,255 120,240 180,260 240,290 300,265 360,250 420,245 480,240 520,238"
    fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6,3"/>

  <!-- Direct labels -->
  <text x="525" y="155" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e63946">US</text>
  <text x="525" y="240" font-family="sans-serif" font-size="10" fill="#94a3b8">Russia</text>
  <text x="525" y="252" font-family="sans-serif" font-size="10" fill="#94a3b8">Saudi</text>

  <!-- Key stat -->
  <text x="60" y="135" font-family="sans-serif" font-size="34" font-weight="bold" fill="#e63946">~40%</text>
  <text x="210" y="135" font-family="sans-serif" font-size="13" fill="#64748b">of global oil from just 3 countries</text>

  <!-- Time axis labels -->
  <text x="60" y="328" font-family="sans-serif" font-size="10" fill="#94a3b8">1970</text>
  <text x="285" y="328" font-family="sans-serif" font-size="10" fill="#94a3b8">2000</text>
  <text x="505" y="328" font-family="sans-serif" font-size="10" fill="#94a3b8">2024</text>

  <!-- OPEC label -->
  <rect x="60" y="338" width="8" height="8" rx="1" fill="rgba(230,57,70,0.5)"/>
  <text x="73" y="346" font-family="sans-serif" font-size="9" fill="#94a3b8">OPEC share declining</text>

  <!-- Source -->
  <text x="60" y="362" font-family="sans-serif" font-size="10" fill="#94a3b8" font-style="italic">Source: Our World in Data &#x7C; &#xA9; 2026 chokotto</text>
</svg>
