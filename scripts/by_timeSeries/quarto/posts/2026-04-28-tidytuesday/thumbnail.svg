<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bgGrad)" rx="8"/>

  <text x="300" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">TidyTuesday</text>
  <text x="300" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="19" font-weight="bold" fill="#1e293b">Global Health Spending</text>
  <text x="300" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">WHO GHED via TidyTuesday 2026-04-21</text>

  <!-- Stylized bars: CHE scale -->
  <g transform="translate(120, 130)">
    <rect x="0" y="80" width="44" height="120" rx="4" fill="#0ea5e9" opacity="0.85"/>
    <rect x="60" y="50" width="44" height="150" rx="4" fill="#0284c7" opacity="0.9"/>
    <rect x="120" y="20" width="44" height="180" rx="4" fill="#0369a1" opacity="0.95"/>
    <rect x="180" y="65" width="44" height="135" rx="4" fill="#38bdf8" opacity="0.8"/>
    <rect x="240" y="100" width="44" height="100" rx="4" fill="#7dd3fc" opacity="0.75"/>
  </g>

  <text x="300" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Out-of-pocket vs public financing</text>
