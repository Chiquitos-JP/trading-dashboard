<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 418" width="800" height="418">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="418" fill="url(#bg)"/>
  <text x="40" y="48" font-family="sans-serif" font-size="13" fill="#94a3b8" font-weight="600" letter-spacing="2">MAKEOVER MONDAY</text>
  <text x="40" y="85" font-family="sans-serif" font-size="26" fill="#1e293b" font-weight="700">London Unemployment</text>
  <text x="40" y="115" font-family="sans-serif" font-size="15" fill="#64748b">Young Londoners Hit Hardest by Labour Market Slowdown</text>
  <!-- Bars representing regions -->
  <g transform="translate(40, 145)">
    <!-- London bar (highlighted) -->
    <rect x="0" y="0" width="520" height="28" rx="3" fill="#e63946" opacity="0.9"/>
    <text x="8" y="19" font-family="sans-serif" font-size="12" fill="white" font-weight="600">London 7.7%</text>
    <!-- Youth diamond -->
    <polygon points="620,14 630,4 640,14 630,24" fill="#f59e0b"/>
    <text x="648" y="19" font-family="sans-serif" font-size="11" fill="#f59e0b" font-weight="600">24.6% Youth</text>
    <!-- North East -->
    <rect x="0" y="36" width="473" height="22" rx="3" fill="#94a3b8" opacity="0.5"/>
    <text x="8" y="52" font-family="sans-serif" font-size="11" fill="#475569">North East 7.0%</text>
    <!-- West Midlands -->
    <rect x="0" y="64" width="405" height="22" rx="3" fill="#94a3b8" opacity="0.4"/>
    <text x="8" y="80" font-family="sans-serif" font-size="11" fill="#475569">West Midlands 6.0%</text>
    <!-- East Midlands -->
    <rect x="0" y="92" width="372" height="22" rx="3" fill="#94a3b8" opacity="0.35"/>
    <text x="8" y="108" font-family="sans-serif" font-size="11" fill="#475569">East Midlands 5.5%</text>
    <!-- South East -->
    <rect x="0" y="120" width="270" height="22" rx="3" fill="#94a3b8" opacity="0.3"/>
    <text x="8" y="136" font-family="sans-serif" font-size="11" fill="#475569">South East 4.0%</text>
    <!-- Northern Ireland -->
    <rect x="0" y="148" width="149" height="22" rx="3" fill="#94a3b8" opacity="0.25"/>
    <text x="8" y="164" font-family="sans-serif" font-size="11" fill="#475569">N. Ireland 2.2%</text>
  </g>
  <!-- Bottom line -->
  <line x1="40" y1="370" x2="760" y2="370" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="395" font-family="sans-serif" font-size="11" fill="#94a3b8">ONS X02 Regional Unemployment &#xB7; Nov 2025 - Jan 2026</text>
  <text x="760" y="395" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">&#xA9; 2026 chokotto</text>
</svg>
