<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 418" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="418" fill="url(#bg)" rx="12"/>

  <!-- Stacked bars representing platform sales -->
  <g transform="translate(60, 80)">
    <!-- NES era -->
    <rect x="0" y="140" width="60" height="120" fill="#ef4444" rx="3" opacity="0.9"/>
    <rect x="0" y="100" width="60" height="40" fill="#f59e0b" rx="3" opacity="0.8"/>
    <!-- SNES -->
    <rect x="80" y="160" width="60" height="100" fill="#ef4444" rx="3" opacity="0.9"/>
    <rect x="80" y="130" width="60" height="30" fill="#f59e0b" rx="3" opacity="0.8"/>
    <rect x="80" y="110" width="60" height="20" fill="#10b981" rx="3" opacity="0.7"/>
    <!-- N64 -->
    <rect x="160" y="180" width="60" height="80" fill="#ef4444" rx="3" opacity="0.9"/>
    <rect x="160" y="150" width="60" height="30" fill="#f59e0b" rx="3" opacity="0.8"/>
    <rect x="160" y="130" width="60" height="20" fill="#10b981" rx="3" opacity="0.7"/>
    <!-- GBA/DS -->
    <rect x="240" y="120" width="60" height="140" fill="#3b82f6" rx="3" opacity="0.9"/>
    <rect x="240" y="80" width="60" height="40" fill="#ef4444" rx="3" opacity="0.8"/>
    <rect x="240" y="50" width="60" height="30" fill="#f59e0b" rx="3" opacity="0.7"/>
    <!-- Wii -->
    <rect x="320" y="60" width="60" height="200" fill="#3b82f6" rx="3" opacity="0.9"/>
    <rect x="320" y="20" width="60" height="40" fill="#ef4444" rx="3" opacity="0.8"/>
    <rect x="320" y="0" width="60" height="20" fill="#f59e0b" rx="3" opacity="0.7"/>
    <!-- 3DS -->
    <rect x="400" y="140" width="60" height="120" fill="#8b5cf6" rx="3" opacity="0.9"/>
    <rect x="400" y="110" width="60" height="30" fill="#3b82f6" rx="3" opacity="0.8"/>
    <!-- Switch -->
    <rect x="480" y="100" width="60" height="160" fill="#8b5cf6" rx="3" opacity="0.9"/>
    <rect x="480" y="60" width="60" height="40" fill="#3b82f6" rx="3" opacity="0.8"/>
    <rect x="480" y="40" width="60" height="20" fill="#10b981" rx="3" opacity="0.7"/>

    <!-- Baseline -->
    <line x1="-10" y1="260" x2="560" y2="260" stroke="#475569" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Mario Game Sales</text>
  <text x="400" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">Nintendo's Compounding Franchise Engine</text>

  <!-- Legend -->
  <g transform="translate(600, 100)">
    <rect x="0" y="0" width="12" height="12" fill="#ef4444" rx="2"/>
    <text x="18" y="11" fill="#cbd5e1" font-size="11">NA</text>
    <rect x="0" y="20" width="12" height="12" fill="#f59e0b" rx="2"/>
    <text x="18" y="31" fill="#cbd5e1" font-size="11">JP</text>
    <rect x="0" y="40" width="12" height="12" fill="#10b981" rx="2"/>
    <text x="18" y="51" fill="#cbd5e1" font-size="11">EU</text>
    <rect x="0" y="60" width="12" height="12" fill="#3b82f6" rx="2"/>
    <text x="18" y="71" fill="#cbd5e1" font-size="11">DS/Wii</text>
    <rect x="0" y="80" width="12" height="12" fill="#8b5cf6" rx="2"/>
    <text x="18" y="91" fill="#cbd5e1" font-size="11">3DS/Switch</text>
  </g>

  <!-- Footer -->
  <text x="400" y="395" text-anchor="middle" fill="#64748b" font-size="11">MakeoverMonday W10 | chokotto</text>
</svg>
