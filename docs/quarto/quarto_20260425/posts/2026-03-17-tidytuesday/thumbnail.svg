<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 418" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="418" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">How Likely is "Likely"?</text>
  <text x="400" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">The Risk Hidden in Probability Words</text>

  <!-- Dot-interval chart for probability phrases -->
  <g transform="translate(160, 90)">
    <!-- Labels -->
    <text x="-10" y="15" text-anchor="end" fill="#94a3b8" font-size="11">Almost certain</text>
    <text x="-10" y="50" text-anchor="end" fill="#94a3b8" font-size="11">Very likely</text>
    <text x="-10" y="85" text-anchor="end" fill="#94a3b8" font-size="11">Probable</text>
    <text x="-10" y="120" text-anchor="end" fill="#94a3b8" font-size="11">Likely</text>
    <text x="-10" y="155" text-anchor="end" fill="#94a3b8" font-size="11">Possible</text>
    <text x="-10" y="190" text-anchor="end" fill="#94a3b8" font-size="11">Unlikely</text>
    <text x="-10" y="225" text-anchor="end" fill="#94a3b8" font-size="11">Almost no chance</text>

    <!-- Thin lines (10-90%) -->
    <line x1="410" y1="11" x2="480" y2="11" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
    <line x1="360" y1="46" x2="460" y2="46" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
    <line x1="300" y1="81" x2="430" y2="81" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
    <line x1="260" y1="116" x2="420" y2="116" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
    <line x1="120" y1="151" x2="350" y2="151" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="186" x2="150" y2="186" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="221" x2="60" y2="221" stroke="#334155" stroke-width="3" stroke-linecap="round"/>

    <!-- IQR bars (25-75%) -->
    <rect x="430" y="5" width="30" height="12" fill="#3b82f6" rx="3" opacity="0.8"/>
    <rect x="390" y="40" width="40" height="12" fill="#3b82f6" rx="3" opacity="0.8"/>
    <rect x="340" y="75" width="60" height="12" fill="#3b82f6" rx="3" opacity="0.8"/>
    <rect x="300" y="110" width="80" height="12" fill="#f59e0b" rx="3" opacity="0.8"/>
    <rect x="180" y="145" width="100" height="12" fill="#ef4444" rx="3" opacity="0.8"/>
    <rect x="50" y="180" width="60" height="12" fill="#3b82f6" rx="3" opacity="0.8"/>
    <rect x="10" y="215" width="30" height="12" fill="#3b82f6" rx="3" opacity="0.8"/>

    <!-- Median dots -->
    <circle cx="445" cy="11" r="4" fill="#f8fafc"/>
    <circle cx="410" cy="46" r="4" fill="#f8fafc"/>
    <circle cx="370" cy="81" r="4" fill="#f8fafc"/>
    <circle cx="340" cy="116" r="4" fill="#f8fafc"/>
    <circle cx="230" cy="151" r="4" fill="#f8fafc"/>
    <circle cx="80" cy="186" r="4" fill="#f8fafc"/>
    <circle cx="25" cy="221" r="4" fill="#f8fafc"/>

    <!-- 50% reference line -->
    <line x1="250" y1="-5" x2="250" y2="240" stroke="#64748b" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="250" y="260" text-anchor="middle" fill="#64748b" font-size="10">50%</text>

    <!-- Scale labels -->
    <text x="0" y="260" text-anchor="middle" fill="#64748b" font-size="10">0%</text>
    <text x="500" y="260" text-anchor="middle" fill="#64748b" font-size="10">100%</text>
  </g>

  <!-- Callout -->
  <rect x="50" y="365" width="700" height="30" fill="#1e293b" rx="6"/>
  <text x="400" y="385" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">
    "Likely" means 60% to one person and 90% to another
  </text>

  <!-- Footer -->
  <text x="400" y="410" text-anchor="middle" fill="#64748b" font-size="10">TidyTuesday 2026-03-10 | CAPphrase | chokotto</text>
</svg>
