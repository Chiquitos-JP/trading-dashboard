<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)" rx="8"/>

  <!-- Title area -->
  <text x="300" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">TidyTuesday</text>
  <text x="300" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Repair Cafes Worldwide</text>
  <text x="300" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">What Can (and Can't) Be Fixed</text>

  <!-- Wrench icon (left) -->
  <g transform="translate(80, 190) rotate(-30)" opacity="0.15">
    <rect x="-8" y="-60" width="16" height="80" rx="4" fill="#3b82f6"/>
    <circle cx="0" cy="-68" r="22" fill="none" stroke="#3b82f6" stroke-width="10"/>
    <circle cx="0" cy="-68" r="10" fill="#f8fafc"/>
  </g>

  <!-- Bar chart: repair success rates -->
  <g transform="translate(160, 120)">
    <!-- Category labels -->
    <text x="-8" y="42" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Electronics</text>
    <text x="-8" y="82" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Clothing</text>
    <text x="-8" y="122" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Furniture</text>
    <text x="-8" y="162" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Bikes</text>
    <text x="-8" y="202" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Appliances</text>

    <!-- Bars (success rates) -->
    <rect x="0" y="28" width="200" height="22" rx="4" fill="#3b82f6" opacity="0.8"/>
    <rect x="0" y="68" width="310" height="22" rx="4" fill="#10b981" opacity="0.8"/>
    <rect x="0" y="108" width="260" height="22" rx="4" fill="#10b981" opacity="0.8"/>
    <rect x="0" y="148" width="340" height="22" rx="4" fill="#10b981" opacity="0.8"/>
    <rect x="0" y="188" width="170" height="22" rx="4" fill="#94a3b8" opacity="0.6"/>

    <!-- Percentage labels -->
    <text x="208" y="44" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#3b82f6">52%</text>
    <text x="318" y="84" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#10b981">81%</text>
    <text x="268" y="124" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#10b981">68%</text>
    <text x="348" y="164" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#10b981">89%</text>
    <text x="178" y="204" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#94a3b8">44%</text>
  </g>

  <!-- Checkmark icon (success) -->
  <g transform="translate(520, 165)">
    <circle cx="0" cy="0" r="28" fill="#10b981" opacity="0.15"/>
    <polyline points="-12,0 -4,8 14,-10" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- X icon (failure) -->
  <g transform="translate(520, 240)">
    <circle cx="0" cy="0" r="28" fill="#ef4444" opacity="0.15"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Stats at bottom -->
  <g transform="translate(0, 345)">
    <rect x="40" y="0" width="150" height="36" rx="6" fill="white" opacity="0.8"/>
    <text x="115" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">200K+</text>
    <text x="115" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Repair Attempts</text>

    <rect x="220" y="0" width="150" height="36" rx="6" fill="white" opacity="0.8"/>
    <text x="295" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#10b981">40+</text>
    <text x="295" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Countries</text>

    <rect x="400" y="0" width="150" height="36" rx="6" fill="white" opacity="0.8"/>
    <text x="475" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b">2015-2025</text>
    <text x="475" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Time Span</text>
  </g>

  <!-- Footer -->
  <text x="300" y="396" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8">&#xA9; 2026 chokotto &#xB7; TidyTuesday 2026-04-07</text>
</svg>
